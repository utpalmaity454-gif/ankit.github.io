<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Swastika ❤️</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
overflow-x:hidden;
background:linear-gradient(-45deg,#ff0844,#ff4e8a,#ff9a9e,#ff1e56);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Sparkles */
.sparkle{
position:fixed;
width:4px;height:4px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
from{opacity:.2;transform:scale(.5)}
to{opacity:1;transform:scale(1.5)}
}

/* Floating hearts */
.heart{
position:fixed;
bottom:-20px;
font-size:18px;
animation:floatUp 7s linear infinite;
}
@keyframes floatUp{to{transform:translateY(-100vh)}}

/* Container */
.container{padding:40px 15px;position:relative;z-index:2}

/* Neon Name */
.neon{
font-size:2.3em;
font-weight:bold;
text-shadow:
0 0 5px #fff,
0 0 10px #ff4e8a,
0 0 20px #ff4e8a,
0 0 40px #ff0844,
0 0 80px #ff0844;
animation:glow 1.5s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 5px #fff,0 0 10px #ff4e8a,0 0 20px #ff4e8a}
to{text-shadow:0 0 15px #fff,0 0 30px #ff9a9e,0 0 60px #ff0844}
}

/* Glass message */
.message{
max-width:95%;
margin:20px auto;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* Gallery */
.gallery img{
width:30%;
min-width:90px;
max-width:120px;
height:120px;
object-fit:cover;
border-radius:15px;
margin:5px;
border:3px solid white;
}

/* Heart photo frame */
.heart-frame{
position:relative;
width:180px;
height:160px;
margin:20px auto;
background:red;
clip-path:polygon(50% 90%,0 40%,20% 0,50% 25%,80% 0,100% 40%);
animation:floatHeart 4s ease-in-out infinite;
}
.heart-frame img{
position:absolute;
top:20px;
left:20px;
width:140px;
height:120px;
object-fit:cover;
border-radius:15px;
}
@keyframes floatHeart{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* Button */
button{
padding:14px 30px;
border:none;
border-radius:40px;
background:white;
color:#ff0844;
font-size:1em;
box-shadow:0 0 15px white;
}

/* Countdown */
#countdownScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#ff0844;
display:flex;
align-items:center;
justify-content:center;
font-size:4em;
z-index:1000;
}

/* Surprise */
#surprise{display:none;margin-top:20px}
.cake{font-size:70px}
.flame{font-size:30px;animation:flicker .3s infinite alternate}
@keyframes flicker{from{opacity:1}to{opacity:.5}}

/* Fireworks */
.firework{
position:fixed;width:8px;height:8px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}
@keyframes explode{to{transform:scale(12);opacity:0}}

/* Confetti */
.confetti{
position:fixed;width:6px;height:12px;
animation:fall 3s linear forwards;
}
@keyframes fall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}

#letter{
margin-top:15px;
white-space:pre-line;
min-height:60px;
}
</style>
</head>
<body>

<div id="countdownScreen">3</div>

<div class="container">

<div class="neon">🎂 Happy Birthday Swastika ❤️</div>

<div class="message">
Swastika, you are my happiness, my peace, and my forever.
Every day with you feels magical.
Today is all about celebrating the queen of my heart. ❤️
</div>

<div class="gallery">
<img src="WhatsApp Image 2025-09-20 at 12.55.09_459cd1aa.jpg">
<img src="us9.jpeg">
<img src="us.jpeg">
</div>

<div class="heart-frame">
<img src="bhondu.jpeg">
</div>

<button onclick="startSurprise()">Open Your Birthday Surprise 🎁</button>

<div id="surprise">
<div class="cake">🎂</div>
<div id="flame" class="flame">🕯️</div>
<p>Blow into the mic to blow the candle 💨</p>
<div id="letter"></div>
</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5a6c7a2f47.mp3?filename=romantic-piano-110624.mp3">
</audio>

<script>

/* Sparkles */
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

/* Floating hearts */
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),7000);
},600);

/* Countdown */
let count=3;
let countdownEl=document.getElementById("countdownScreen");
let interval=setInterval(()=>{
count--;
if(count>0){countdownEl.innerHTML=count}
else{
countdownEl.innerHTML="❤️";
setTimeout(()=>countdownEl.style.display="none",800);
clearInterval(interval);
}
},1000);

function startSurprise(){
document.getElementById("surprise").style.display="block";
document.getElementById("music").play();
launchFireworks();
startConfetti();
startMic();
typeLetter();
}

function launchFireworks(){
for(let i=0;i<25;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*window.innerWidth+"px";
f.style.top=Math.random()*window.innerHeight+"px";
f.style.backgroundColor="hsl("+Math.random()*360+",100%,60%)";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
}

function startConfetti(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor="hsl("+Math.random()*360+",100%,60%)";
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

function startMic(){
navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{
let audioContext=new(window.AudioContext||window.webkitAudioContext)();
let mic=audioContext.createMediaStreamSource(stream);
let analyser=audioContext.createAnalyser();
mic.connect(analyser);
analyser.fftSize=256;
let data=new Uint8Array(analyser.frequencyBinCount);
function detect(){
analyser.getByteFrequencyData(data);
let volume=data.reduce((a,b)=>a+b)/data.length;
if(volume>60){
document.getElementById("flame").style.display="none";
launchFireworks();
startConfetti();
}
requestAnimationFrame(detect);
}
detect();
});
}

function typeLetter(){
let text="Happy Birthday bhakk😗😗🎀💗 today is the most special day for me because it's your birthday, its the day the most closest person in my life was born so yeah it's special to me, i just want to sit and write everything but words are never enough to explain how much i feel for you, from the monent you came into my life i started to feel different like yes i got someone to care for, i got someone who cares for me, you are not just my girlfriend you are my bestfriend too with whom i can share every but still will never felt judge for my words. I know you don't think me as of your home but i do still i do coz someday i gave you that place which i think i will never give to so causally to anyone else like you.. huh whatever... You understand me in Ways many felt too and you accepted me just the way i am. You are the most precious person in my life and i thank the universe for bringing you to me.
Once again happy birthday my love, i hope your day is filled with you laughter, joy, happiness and surprises yet to com3 and I want you to keep smiling and shining like a actual diva;
Love you malik>3🙆🏼‍♂️🎀💗🫂";
let i=0;
function typing(){
if(i<text.length){
document.getElementById("letter").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}
}
typing();
}

</script>
</body>
</html>
